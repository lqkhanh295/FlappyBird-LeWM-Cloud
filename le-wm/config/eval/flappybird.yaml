defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/FlappyBird-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: 1000

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42
policy: random

plan_config:
  horizon: 15
  receding_horizon: 1
  action_block: 1

eval:
  num_eval: 10
  goal_offset_steps: 50
  eval_budget: 1000
  img_size: 224
  dataset_name: flappybird_expert_train
  callables: []
          
output:
  filename: flappybird_results.txt
